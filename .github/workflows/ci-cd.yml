name: CI/CD - CourseForge

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  BUILD_DIR: dist/course-forge/browser

# =============================================================================
jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - CI: Lint, Test & Build
  # Runs on every push and PR. Fast-fail: if the build breaks, deploy is skipped.
  # ---------------------------------------------------------------------------
  ci:
    name: "Lint / Test / Build"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        # npm ci guarantees exact versions from lock file; --prefer-offline uses cache first
        run: npm ci --prefer-offline

      - name: Lint
        # --if-present skips silently if the lint script is not yet defined
        run: npm run lint --if-present

      - name: Unit tests (ChromeHeadless)
        run: npm test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Production build
        run: npm run build -- --configuration=production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist-${{ github.sha }}
          path: ${{ env.BUILD_DIR }}
          retention-days: 7
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # JOB 2 - DEPLOY: S3 Sync + CloudFront Invalidation
  # Runs only when:
  #   (a) the ci job passed, AND
  #   (b) the event is a direct push to main (PRs do NOT deploy)
  # ---------------------------------------------------------------------------
  deploy:
    name: "Deploy to AWS (S3 + CloudFront)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://${{ secrets.CLOUDFRONT_DOMAIN }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-dist-${{ github.sha }}
          path: ${{ env.BUILD_DIR }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ---------------------------------------------------------------------------
      # Two-phase S3 sync strategy:
      #
      # Phase 1 - Hashed assets (e.g. main.abc123.js)
      #   Cache-Control: max-age=31536000,immutable
      #   Angular CLI produces content-hashed filenames; safe to cache for 1 year.
      #
      # Phase 2 - index.html (entry point, no hash)
      #   Cache-Control: no-cache
      #   Browser always revalidates; ensures users load the new JS/CSS hashes.
      # ---------------------------------------------------------------------------
      - name: "S3 sync: hashed assets (cache 1 year)"
        run: |
          aws s3 sync "${{ env.BUILD_DIR }}" "s3://${{ secrets.S3_BUCKET_NAME }}" \
            --exclude "index.html" \
            --exclude "*.map" \
            --cache-control "max-age=31536000,immutable" \
            --delete

      - name: "S3 sync: index.html (no-cache)"
        run: |
          aws s3 sync "${{ env.BUILD_DIR }}" "s3://${{ secrets.S3_BUCKET_NAME }}" \
            --exclude "*" \
            --include "index.html" \
            --include "*.map" \
            --cache-control "no-cache,no-store,must-revalidate"

      # Invalidation forces all CloudFront PoPs to fetch fresh objects on next request.
      # First 1,000 paths/month are free.
      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)
          echo "Invalidation ID: $INVALIDATION_ID"
          echo "INVALIDATION_ID=$INVALIDATION_ID" >> "$GITHUB_ENV"

      - name: Wait for invalidation to complete
        run: |
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --id "$INVALIDATION_ID"
        timeout-minutes: 5

      - name: Write deploy summary
        run: |
          echo "### Deploy successful" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| S3 Bucket | \`${{ secrets.S3_BUCKET_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CF Invalidation | \`$INVALIDATION_ID\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| URL | https://${{ secrets.CLOUDFRONT_DOMAIN }} |" >> "$GITHUB_STEP_SUMMARY"
