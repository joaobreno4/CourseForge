name: CI/CD CourseForge

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  BUILD_DIR: dist/course-forge/browser

jobs:

  ci:
    name: Lint and Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Production build
        run: npm run build -- --configuration=production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist-${{ github.sha }}
          path: ${{ env.BUILD_DIR }}
          retention-days: 7
          if-no-files-found: error

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-dist-${{ github.sha }}
          path: ${{ env.BUILD_DIR }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: S3 sync hashed assets
        run: |
          aws s3 sync "${{ env.BUILD_DIR }}" "s3://${{ secrets.S3_BUCKET_NAME }}" \
            --exclude "index.html" \
            --exclude "*.map" \
            --cache-control "max-age=31536000,immutable" \
            --delete

      - name: S3 sync index.html
        run: |
          aws s3 sync "${{ env.BUILD_DIR }}" "s3://${{ secrets.S3_BUCKET_NAME }}" \
            --exclude "*" \
            --include "index.html" \
            --include "*.map" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)
          echo "INVALIDATION_ID=$INVALIDATION_ID" >> "$GITHUB_ENV"

      - name: Wait for invalidation
        run: |
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --id "$INVALIDATION_ID"
        timeout-minutes: 5

      - name: Deploy summary
        run: |
          echo "### Deploy OK" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bucket | \`${{ secrets.S3_BUCKET_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CF Invalidation | \`$INVALIDATION_ID\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| URL | https://${{ secrets.CLOUDFRONT_DOMAIN }} |" >> "$GITHUB_STEP_SUMMARY"
